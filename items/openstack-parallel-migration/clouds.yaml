clouds:  
  # Used by openstacksdk for operations on source
  # Recommended is usage of application credentials.
  source:
    auth:
      auth_url: https://keystone.cloudferro.com:5000/v3
      application_credential_id: 
      application_credential_secret: 
    regions:
    - WAW3-1
    interface: "public"
    identity_api_version: 3
    auth_type: "v3applicationcredential"
  
  # Alternatively, using password authentication
  # Update auth_url, username, password, project_name, domain names, and region_name according to your source cloud (e.g. CloudFerro WAW3-1).
  source_passauth:
    auth:
      auth_url: https://keystone.cloudferro.com:5000/v3
      username: 
      password: 
      project_name: 
      user_domain_name: 
      project_domain_name: 
    region_name: WAW3-1
    interface: public
    identity_api_version: 3
    
  target:
    auth:
      auth_url: https://keystone.api.r1.cloud.eumetsat.int
      application_credential_id: 
      application_credential_secret: 
    regions:
    - ECIS-R1
    interface: "public"
    identity_api_version: 3
    auth_type: "v3applicationcredential"

  # Alternatively, using password authentication for target
  # Update auth_url, username, password, project_name, domain names, and region_name according to your target cloud (e.g. CloudFerro ECIS R1).
  target_passauth:
    auth:
      auth_url: https://keystone.api.r1.cloud.eumetsat.int
      username: 
      password: 
      project_name: 
      user_domain_name: Default
      project_domain_name: Default
    regions:
    - ECIS-R1
    interface: public
    identity_api_version: 3
